name: Shared CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

concurrency:
  group: shared-sonar-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'apps/shared/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - '.github/workflows/**'

  shared-build:
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Run shared tests
        run: ./gradlew :apps:shared:test

      - name: Run shared Sonar analysis
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_SHARED }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=se2-gruppenprojekt_se2-group-codebase_frontend_backend
            -Dsonar.organization=se2-gruppenprojekt
            -Dsonar.projectName=shared
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectBaseDir=apps/shared

  shared-required:
    name: shared-required
    needs: [changes, shared-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pass when shared not affected
        if: needs.changes.outputs.shared != 'true'
        run: echo "No shared-related changes."

      - name: Fail if shared job failed
        if: needs.changes.outputs.shared == 'true' && needs.shared-build.result != 'success'
        run: exit 1

      - name: Pass if shared job succeeded
        if: needs.changes.outputs.shared == 'true' && needs.shared-build.result == 'success'
        run: echo "Shared checks passed."
