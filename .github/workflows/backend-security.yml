name: Backend Security Scan

on:
  # Manual trigger for demos, submission checks, and ad hoc reruns.
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/backend/**"
      - "docs/security.md"
      - ".github/workflows/backend-security.yml"
  # Keep the default branch covered after merges as well.
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "docs/security.md"
      - ".github/workflows/backend-security.yml"
  # Periodic passive scan of the deployed backend, even without active PR work.
  schedule:
    - cron: "0 6 * * 1"

# Avoid multiple overlapping scans for the same pull request or branch ref.
concurrency:
  group: backend-security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# The workflow reads repository contents and allows OWASP ZAP to create or
# update GitHub issues for detected security findings when needed.
permissions:
  contents: read
  issues: write

env:
  # Centralize the deployed target URLs so wake-up and scan steps stay aligned.
  BACKEND_BASE_URL: https://se2-group-codebase.onrender.com
  HEALTH_URL: https://se2-group-codebase.onrender.com/actuator/health

jobs:
  zap-baseline-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    # Render cold starts plus the passive scan can take a few minutes.
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for deployed backend
        run: |
          # Render may keep the deployment asleep, so poll the health endpoint
          # before starting ZAP to avoid scanning an unavailable target.
          for i in {1..30}; do
            if curl -fsS "$HEALTH_URL"; then
              echo "Backend is reachable"
              exit 0
            fi

            echo "Waiting for backend to wake up..."
            sleep 10
          done

          echo "Backend was not reachable"
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.BACKEND_BASE_URL }}
          # -a enables additional passive rules; -I keeps warnings visible
          # without failing CI purely because ZAP reported non-blocking issues.
          cmd_options: "-a -I"

      - name: Publish ZAP summary
        if: always()
        run: |
          # Expose the markdown report directly in the Actions summary so the
          # result is visible in CI without downloading artifacts first.
          {
            echo "## OWASP ZAP Baseline Scan"
            echo
            if [ -f report_md.md ]; then
              cat report_md.md
            else
              echo "No markdown report was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Preserve the full reports for later review, discussion, or issue
          # creation even when the workflow is only checked briefly in CI.
          name: zap-security-report
          retention-days: 14
          path: |
            report_html.html
            report_md.md
            report_json.json
