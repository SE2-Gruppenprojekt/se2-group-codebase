name: Organization User Activity Report (Exact Range)

on:
  workflow_dispatch:
    inputs:
      report_since:
        description: "Exact start date in YYYY-MM-DD"
        required: true
      report_until:
        description: "Exact end date in YYYY-MM-DD"
        required: true

concurrency:
  group: org-activity-report-exact-range-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TARGET_ORGANIZATION: ${{ github.repository_owner }}

jobs:
  generate-exact-range-report:
    name: Generate exact-range activity report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REPORT_SINCE: ${{ inputs.report_since }}T00:00:00Z
      REPORT_UNTIL: ${{ inputs.report_until }}T00:00:00Z

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate exact-range organization activity report
        env:
          GH_TOKEN: ${{ secrets.ORG_ACTIVITY_REPORT_TOKEN }}
        run: python3 .github/scripts/generate_org_user_activity.py

      - name: Publish report summary
        if: always()
        run: |
          {
            echo "## Exact Range Organization User Activity Report"
            echo
            echo "- Organization: $TARGET_ORGANIZATION"
            echo "- Date span: ${REPORT_SINCE:0:10} to ${REPORT_UNTIL:0:10}"
            echo "- Data source: direct GitHub organization and repository API queries"
            echo
            if [ -f reports/organization_user_activity.md ]; then
              head -n 120 reports/organization_user_activity.md
            else
              echo "No markdown report was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload exact-range activity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: organization-user-activity-report-exact-range
          retention-days: 14
          path: |
            reports/organization_user_activity.csv
            reports/organization_user_activity.json
            reports/organization_repository_activity.csv
            reports/organization_user_activity.md
